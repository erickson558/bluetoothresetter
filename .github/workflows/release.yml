name: build-and-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Read application version
        id: version
        shell: pwsh
        run: |
          $version = @'
          import sys
          sys.path.insert(0, "src")
          from bluetooth_resetter.version import __version__
          print(__version__)
          '@ | python -
          if (-not $version) { throw 'No se pudo obtener la versión.' }
          "app_version=$($version.Trim())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build executable
        shell: pwsh
        run: .\build.ps1 -Clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BluetoothResetter-${{ steps.version.outputs.app_version }}
          path: |
            BluetoothResetter.exe
            Fix-AudioBluetooth-Admin.bat
            scripts/Fix-AudioBluetooth.ps1
            README.md
            LICENSE

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.app_version }}
          name: ${{ steps.version.outputs.app_version }}
          generate_release_notes: true
          files: |
            BluetoothResetter.exe
            Fix-AudioBluetooth-Admin.bat
            scripts/Fix-AudioBluetooth.ps1
